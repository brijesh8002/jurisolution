<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juris Solution | Checkout</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>

<body>

<header id="header" class="sticky-top"></header>


<!-- checkout section start -->

<section class="checkout-section py-5">
  <div class="container">
    <div class="row g-4">

      <!-- LEFT: BILLING DETAILS -->
      <div class="col-lg-7">
        <div class="checkout-box">
          <h4 class="mb-4">Billing Details</h4>

          <form>
            <div class="row">
              <div class="col-md-6 mb-3">
                <input type="text" class="form-control" placeholder="First Name" required>
              </div>
              <div class="col-md-6 mb-3">
                <input type="text" class="form-control" placeholder="Last Name" required>
              </div>
            </div>

            <div class="mb-3">
              <input type="email" class="form-control" placeholder="Email Address" required>
            </div>

            <div class="mb-3">
              <input type="tel" class="form-control" placeholder="Phone Number" required>
            </div>

            <div class="mb-3">
              <textarea class="form-control" rows="3" placeholder="Address"></textarea>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <input type="text" class="form-control" placeholder="City">
              </div>
              <div class="col-md-6 mb-3">
                <input type="text" class="form-control" placeholder="State">
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <input type="text" class="form-control" placeholder="Country">
              </div>
              <div class="col-md-6 mb-3">
                <input type="text" class="form-control" placeholder="Pincode">
              </div>
            </div>
            <div class="mb-3">
              <textarea class="form-control" rows="3" placeholder="Order Notes (optional)"></textarea>
            </div>

          </form>
        </div>
      </div>

      <!-- RIGHT: ORDER SUMMARY -->
      <div class="col-lg-5">
        <div class="checkout-box summary-box">
          <h4 class="mb-4">Your Order</h4>

          <!-- ITEMS -->
          <div class="summary-item">
            <span>Trademark & Copyright</span>
            <span>₹3,000</span>
          </div>

          <div class="summary-item">
            <span>Company Incorporation</span>
            <span>₹3,000</span>
          </div>

          <hr>

          <div class="summary-item">
            <span>Subtotal</span>
            <span>₹6,000</span>
          </div>

          <div class="summary-item">
            <span>Tax (5%)</span>
            <span>₹300</span>
          </div>

          <div class="summary-item total">
            <span>Total</span>
            <span>₹6,300</span>
          </div>

          <!-- PAYMENT OPTIONS -->
          <div class="payment-method mt-4">
            <h6 class="mb-3">Payment Method</h6>

            <label class="payment-option">
              <input type="radio" name="payment" checked>
              <span>UPI / Card / Net Banking</span>
            </label>
          </div>

          <!-- BUTTON -->
          <button class="place-order-btn mt-4 w-100" onclick="location.href='thankyou.html'">
            Place Order <i class="fa-solid fa-arrow-right"></i>
          </button>

        </div>
      </div>

    </div>
  </div>
</section>

<!-- checkout section end -->

 </body>

</html>
